<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Sistema de Créditos</title>
</head>

<body>

  <header>
    <h1>Sistema Básico de Créditos</h1>
    <link rel="stylesheet" href="simulador_completo.css">
  </header>

  <nav>
    <button onclick="mostrarSeccion('parametros')">Parámetros</button>
    <button onclick="mostrarSeccion('clientes')">Clientes</button>
    <button onclick="mostrarSeccion('creditos')">Créditos</button>
    <button onclick="mostrarSeccion('registro')">Créditos Registrados</button>
    <button onclick="mostrarSeccion('contacto')">Contato</button>
  </nav>

  <section id="parametros">
    <h2>Configurar Parámetros</h2>

    <label>Tasa de interés:</label>
    <input type="number" id="tasaInteres" min="10" max="20" value="15">
    <span>%</span>

    <br>
    <button onclick="guardarTasa()">Guardar tasa</button>

    <br><br>

    <label>Monto Máximo de Crédito:</label>
    <input type="number" id="montoMaximo" value="20000">
    
    <br>
    <button onclick="guardarMontoMaximo()">Guardar Monto Máximo</button>

    <p id="mensajeTasa"></p>
    <p id="mensajeMonto"></p>
  </section>

  <section id="clientes">
    <h2>Registro de Clientes</h2>

    <input type="text" id="cedula" placeholder="Cédula">
    <input type="text" id="nombre" placeholder="Nombre">
    <input type="text" id="apellido" placeholder="Apellido">
    <input type="number" id="ingresos" placeholder="Ingresos Mensuales">
    <input type="number" id="egresos" placeholder="Egresos Mensuales">
    <input type="number" id="telefono" placeholder="Teléfono">
    <input type="email" id="correo" placeholder="Correo Electronico">

    <br>

    <button onclick="guardarCliente()">Guardar cliente</button>
    <button onclick="seleccionarCliente(document.getElementById('cedula').value)">Buscar cliente</button>
    <button onclick="limpiar()">Limpiar</button>

    <table>
      <thead>
        <tr>
          <th>Cédula</th>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>Ingresos</th>
          <th>Egresos</th>
          <th>Teléfono</th>
          <th>Correo</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaClientes"></tbody>
    </table>
  </section>

  <section id="creditos">
    <h2>Solicitar Crédito</h2>

    <input type="number" id="buscarCedulaCredito" placeholder="Cédula del cliente">
    <button onclick="buscarClienteCredito()">Buscar cliente</button>

    <div id="datosClienteCredito" class="card"></div>

    <input type="number" id="montoCredito" placeholder="Monto a solicitar ($)">
    <input type="number" id="plazoCredito" placeholder="Plazo en años">

    <br>

    <button onclick="calcularCredito()">Calcular crédito</button>

    <div id="resultadoCredito"></div>

    <button id="btnAsignarCredito" onclick="asignarCredito()" disabled>
      Asignar crédito
    </button>
  </section>
  <section id="registro">

    <h2>Créditos Registrados</h2>

    <input type="text" id="buscarCedulaListado">
    <button onclick="buscarCreditosCliente()">Buscar</button>
    <button onclick="pintarCreditos(creditos)">Ver todos</button>
    <button id="btnVIP" onclick="filtrarVIP()">Créditos VIP</button>

    <table>
      <thead>
        <tr>
          <th>Cédula</th>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>Monto</th>
          <th>Tasa</th>
          <th>Plazo</th>
          <th>Cuota</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody id="tablaCreditos"></tbody>
    </table>
  </section>

  <section id="contacto">
    <p class="author">Desarrollado por Dilan Solorzano</p>
  </section>

  <script src="simulador_completo.js"></script>
  <script src="utilitarios.js"></script>
</body>

</html>
